<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Buscador de Libros</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f5f5f5;
    }

    h1 {
      margin-top: 20px;
    }

    input {
      padding: 10px;
      margin: 5px;
      width: 220px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: #1a73e8;
      color: white;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background: #1558b0;
    }

    .resultado {
      background: white;
      margin: 15px auto;
      padding: 15px;
      width: 320px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    img {
      width: 120px;
      border-radius: 6px;
    }

    a {
      display: inline-block;
      margin: 5px;
      text-decoration: none;
      color: #1a73e8;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <h1>📚 Buscador de Libros</h1>

  <input type="text" id="busqueda" placeholder="Nombre del libro">
  <br>
  <button onclick="buscarLibros()">Buscar</button>

  <div id="resultados"></div>

  <script>

    async function buscarLibros() {

      let query = document.getElementById("busqueda").value;

      if (!query) {
        alert("Por favor escribe un libro");
        return;
      }

      let contenedor = document.getElementById("resultados");
      contenedor.innerHTML = "🔎 Buscando libros...";

      try {

        let url = "https://openlibrary.org/search.json?q=" 
                  + encodeURIComponent(query) 
                  + "&limit=5&fields=title,author_name,cover_i,key,ebook_access";

        let respuesta = await fetch(url);
        let datos = await respuesta.json();

        contenedor.innerHTML = "";

        let librosFiltrados = datos.docs.filter(libro => 
          libro.ebook_access === "public"
        );

        if (librosFiltrados.length === 0) {
          contenedor.innerHTML = "❌ No se encontraron libros gratuitos";
          return;
        }

        librosFiltrados.forEach(libro => {

          let titulo = libro.title || "Sin título";
          let autor = libro.author_name ? libro.author_name[0] : "Desconocido";

          let portada = libro.cover_i 
            ? "https://covers.openlibrary.org/b/id/" + libro.cover_i + "-M.jpg"
            : "";

          let link = "https://openlibrary.org" + libro.key;

          contenedor.innerHTML += `
            <div class="resultado">
              <h3>${titulo}</h3>
              <p>${autor}</p>

              ${portada ? `<img src="${portada}">` : ""}

              <br><br>

              <a href="${link}" target="_blank">
                📖 Ver libro
              </a>

              <br>

              <a href="https://www.google.com/search?q=${encodeURIComponent(titulo + ' ' + autor + ' filetype:pdf')}" target="_blank">
                📥 Buscar PDF
              </a>
            </div>
          `;
        });

      } catch (error) {
        contenedor.innerHTML = "⚠️ Error al buscar. Intenta nuevamente.";
        console.error(error);
      }
    }

  </script>

</body>
</html>
